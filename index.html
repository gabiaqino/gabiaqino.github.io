<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Precios</title>

  <!-- ZXing: lee EAN-13 desde la cámara, sin instalar nada -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    /* ── Variables ─────────────────────────── */
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --card:     #22263a;
      --border:   #2e3250;
      --accent:   #4f8ef7;
      --accent2:  #7c5cfc;
      --green:    #34d399;
      --red:      #f87171;
      --text:     #e8eaf6;
      --muted:    #7b82a8;
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 120px;
    }

    /* ── Header ────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--accent);
      margin-bottom: 10px;
    }

    /* ── Barra de búsqueda ─────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #searchInput {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    .btn-icon {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 1.4rem;
      height: 44px;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-icon:active { transform: scale(.93); }

    /* ── Estado / spinner ──────────────────── */
    #status {
      font-size: .8rem;
      color: var(--muted);
      padding: 6px 16px 0;
      min-height: 20px;
    }

    /* ── Cámara ────────────────────────────── */
    #scannerContainer {
      display: none;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #scannerContainer.active { display: block; }

    #preview {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: var(--radius);
      background: #000;
      display: block;
    }

    .scan-hint {
      font-size: .8rem;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    #btnCerrarCamara {
      margin-top: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: .85rem;
      padding: 8px;
      width: 100%;
      cursor: pointer;
    }

    /* ── Resultados ────────────────────────── */
    #results {
      padding: 12px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .result-card:active { background: #2a2f48; }
    .result-card.selected {
      border-color: var(--green);
      background: #1a2e29;
    }

    .card-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      transition: background .15s, border-color .15s;
    }
    .selected .card-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-producto {
      font-size: .95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-meta span { display: flex; align-items: center; gap: 3px; }

    .card-precio {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Carrito (parte inferior) ──────────── */
    #carrito {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      max-height: 55vh;
      display: flex;
      flex-direction: column;
    }

    #carritoHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #carritoTitle {
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
    }

    #totalDisplay {
      font-size: 1rem;
      font-weight: 800;
      color: var(--green);
    }

    #carritoItems {
      overflow-y: auto;
      padding: 0 16px 12px;
      display: none;
    }
    #carritoItems.open { display: block; }

    .carrito-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .carrito-item:last-child { border-bottom: none; }

    .ci-info { flex: 1; min-width: 0; }
    .ci-nombre {
      font-size: .85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ci-meta { font-size: .75rem; color: var(--muted); }
    .ci-precio { font-weight: 700; color: var(--accent); font-size: .9rem; flex-shrink: 0; }

    .ci-qty {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .ci-qty button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ci-qty span {
      font-weight: 700;
      min-width: 18px;
      text-align: center;
      font-size: .9rem;
    }

    .btn-limpiar {
      background: none;
      border: 1px solid var(--red);
      border-radius: 8px;
      color: var(--red);
      font-size: .75rem;
      padding: 4px 10px;
      cursor: pointer;
      margin-top: 8px;
      display: block;
      width: 100%;
    }

    /* ── Sin resultados ────────────────────── */
    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      padding: 30px 0;
    }
  </style>
</head>
<body>

  <!-- ── Header / buscador ─── -->
  <header>
    <h1>🏷️ Consulta de precios</h1>
    <div class="search-row">
      <input id="searchInput" type="search" placeholder="Buscar producto..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn-icon" id="btnScan" title="Escanear código de barras">
        <!-- ícono de barcode inline SVG -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="2" height="16" fill="white"/>
          <rect x="6" y="4" width="1" height="16" fill="white"/>
          <rect x="9" y="4" width="2" height="16" fill="white"/>
          <rect x="13" y="4" width="1" height="16" fill="white"/>
          <rect x="16" y="4" width="2" height="16" fill="white"/>
          <rect x="20" y="4" width="2" height="16" fill="white"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="status"></div>

  <!-- ── Cámara / escáner ─── -->
  <div id="scannerContainer">
    <video id="preview" autoplay muted playsinline></video>
    <p class="scan-hint">Apuntá la cámara al código de barras</p>
    <button id="btnCerrarCamara">✕ Cerrar cámara</button>
  </div>

  <!-- ── Resultados ─── -->
  <div id="results"></div>

  <!-- ── Carrito ─── -->
  <div id="carrito">
    <div id="carritoHeader">
      <span id="carritoTitle">🛒 Seleccionados (<span id="carritoCount">0</span>)</span>
      <span id="totalDisplay">$ 0</span>
    </div>
    <div id="carritoItems"></div>
  </div>

<script>
// ══════════════════════════════════════════════════
//  CONFIGURACIÓN — cambiá solo esta URL
// ══════════════════════════════════════════════════
const AS_URL = "https://script.google.com/macros/s/TU_DEPLOYMENT_ID_AQUI/exec";
// ══════════════════════════════════════════════════

// ── Estado ─────────────────────────────────────────
let debounceTimer = null;
let carritoItems  = {}; // key: producto+talla, value: {producto, talla, precio, qty}
let carritoOpen   = false;
let scannerActive = false;
let zxingReader   = null;

// ── Elementos DOM ───────────────────────────────────
const searchInput       = document.getElementById("searchInput");
const statusEl          = document.getElementById("status");
const resultsEl         = document.getElementById("results");
const scannerContainer  = document.getElementById("scannerContainer");
const preview           = document.getElementById("preview");
const btnScan           = document.getElementById("btnScan");
const btnCerrarCamara   = document.getElementById("btnCerrarCamara");
const carritoHeader     = document.getElementById("carritoHeader");
const carritoItemsEl    = document.getElementById("carritoItems");
const carritoCountEl    = document.getElementById("carritoCount");
const totalDisplayEl    = document.getElementById("totalDisplay");

// ── Búsqueda por texto ──────────────────────────────
searchInput.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) {
    resultsEl.innerHTML = "";
    setStatus("");
    return;
  }
  setStatus("Buscando…");
  debounceTimer = setTimeout(() => buscarTexto(q), 350);
});

async function buscarTexto(q) {
  try {
    const data = await fetchAS("?q=" + encodeURIComponent(q));
    renderResultados(data.results || [], `${data.total ?? 0} resultado(s) para "${q}"`);
  } catch(e) {
    setStatus("⚠️ Error al conectar con el servidor");
  }
}

// ── Búsqueda por EAN ────────────────────────────────
async function buscarEAN(ean) {
  setStatus("Buscando código " + ean + "…");
  try {
    const data = await fetchAS("?ean=" + encodeURIComponent(ean));
    if (data.results && data.results.length > 0) {
      renderResultados(data.results, "Código encontrado");
    } else {
      renderResultados([], "Código no encontrado: " + ean);
    }
  } catch(e) {
    setStatus("⚠️ Error al conectar con el servidor");
  }
}

// ── Fetch al Apps Script ────────────────────────────
async function fetchAS(params) {
  const res = await fetch(AS_URL + params);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return await res.json();
}

// ── Render resultados ───────────────────────────────
function renderResultados(items, msg) {
  setStatus(msg);
  resultsEl.innerHTML = "";

  if (!items || items.length === 0) {
    resultsEl.innerHTML = '<p class="empty-msg">Sin resultados</p>';
    return;
  }

  items.forEach(item => {
    const key = itemKey(item);
    const enCarrito = !!carritoItems[key];

    const card = document.createElement("div");
    card.className = "result-card" + (enCarrito ? " selected" : "");
    card.innerHTML = `
      <div class="card-check">${enCarrito ? "✓" : ""}</div>
      <div class="card-info">
        <div class="card-producto">${esc(item.producto)}</div>
        <div class="card-meta">
          ${item.talla ? `<span>📐 ${esc(item.talla)}</span>` : ""}
          ${item.ean   ? `<span style="color:#555">▌▌${esc(item.ean)}</span>` : ""}
          ${item.stock !== undefined && item.stock !== "" ? `<span>📦 ${item.stock}</span>` : ""}
        </div>
      </div>
      <div class="card-precio">$${formatPrecio(item.precio)}</div>
    `;

    card.addEventListener("click", () => toggleCarrito(item, card, key));
    resultsEl.appendChild(card);
  });
}

// ── Toggle carrito ──────────────────────────────────
function toggleCarrito(item, card, key) {
  if (carritoItems[key]) {
    delete carritoItems[key];
    card.classList.remove("selected");
    card.querySelector(".card-check").textContent = "";
  } else {
    carritoItems[key] = { ...item, qty: 1 };
    card.classList.add("selected");
    card.querySelector(".card-check").textContent = "✓";
  }
  actualizarCarrito();
}

// ── Actualizar carrito ──────────────────────────────
function actualizarCarrito() {
  const keys = Object.keys(carritoItems);
  carritoCountEl.textContent = keys.length;

  let total = 0;
  keys.forEach(k => {
    const it = carritoItems[k];
    total += (parseFloat(it.precio) || 0) * it.qty;
  });
  totalDisplayEl.textContent = "$ " + formatPrecio(total);

  // Render items del carrito
  carritoItemsEl.innerHTML = "";
  if (keys.length === 0) {
    carritoItemsEl.classList.remove("open");
    carritoOpen = false;
    return;
  }

  keys.forEach(k => {
    const it = carritoItems[k];
    const div = document.createElement("div");
    div.className = "carrito-item";
    div.innerHTML = `
      <div class="ci-info">
        <div class="ci-nombre">${esc(it.producto)}</div>
        <div class="ci-meta">${it.talla ? "Talla: " + esc(it.talla) + " · " : ""}$ ${formatPrecio(it.precio)} c/u</div>
      </div>
      <div class="ci-qty">
        <button data-key="${k}" data-op="-">−</button>
        <span>${it.qty}</span>
        <button data-key="${k}" data-op="+">+</button>
      </div>
      <div class="ci-precio">$${formatPrecio((parseFloat(it.precio)||0) * it.qty)}</div>
    `;
    carritoItemsEl.appendChild(div);
  });

  // Botón limpiar
  const btnLimpiar = document.createElement("button");
  btnLimpiar.className = "btn-limpiar";
  btnLimpiar.textContent = "🗑 Limpiar todo";
  btnLimpiar.addEventListener("click", () => {
    carritoItems = {};
    actualizarCarrito();
    // deseleccionar cards visibles
    document.querySelectorAll(".result-card.selected").forEach(c => {
      c.classList.remove("selected");
      c.querySelector(".card-check").textContent = "";
    });
  });
  carritoItemsEl.appendChild(btnLimpiar);

  // Delegación de eventos qty
  carritoItemsEl.querySelectorAll("[data-op]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const k   = btn.dataset.key;
      const op  = btn.dataset.op;
      if (!carritoItems[k]) return;
      carritoItems[k].qty += (op === "+" ? 1 : -1);
      if (carritoItems[k].qty <= 0) {
        delete carritoItems[k];
        // deseleccionar card si está visible
        document.querySelectorAll(".result-card.selected").forEach(card => {
          // buscamos por producto+talla
        });
      }
      actualizarCarrito();
    });
  });
}

// ── Toggle abrir/cerrar carrito ─────────────────────
carritoHeader.addEventListener("click", () => {
  if (Object.keys(carritoItems).length === 0) return;
  carritoOpen = !carritoOpen;
  carritoItemsEl.classList.toggle("open", carritoOpen);
});

// ── Escáner ZXing ───────────────────────────────────
btnScan.addEventListener("click", abrirCamara);
btnCerrarCamara.addEventListener("click", cerrarCamara);

async function abrirCamara() {
  if (scannerActive) { cerrarCamara(); return; }

  // ZXing requiere que la lib esté cargada
  if (typeof ZXing === "undefined") {
    setStatus("⚠️ Librería de escaneo no disponible");
    return;
  }

  scannerContainer.classList.add("active");
  scannerActive = true;
  setStatus("Iniciando cámara…");

  try {
    const hints = new Map();
    const formats = [ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.CODE_128];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

    zxingReader = new ZXing.BrowserMultiFormatReader(hints);

    // Preferimos cámara trasera
    const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
    const backCam = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
    const deviceId = backCam ? backCam.deviceId : undefined;

    zxingReader.decodeFromVideoDevice(deviceId, preview, (result, err) => {
      if (result) {
        const ean = result.getText();
        cerrarCamara();
        searchInput.value = ean;
        buscarEAN(ean);
      }
      // err es normal entre frames, no lo mostramos
    });

    setStatus("Cámara activa — apuntá al código");
  } catch(e) {
    setStatus("⚠️ No se pudo acceder a la cámara: " + e.message);
    cerrarCamara();
  }
}

function cerrarCamara() {
  if (zxingReader) {
    zxingReader.reset();
    zxingReader = null;
  }
  if (preview.srcObject) {
    preview.srcObject.getTracks().forEach(t => t.stop());
    preview.srcObject = null;
  }
  scannerContainer.classList.remove("active");
  scannerActive = false;
  setStatus("");
}

// ── Utilidades ──────────────────────────────────────
function setStatus(msg) {
  statusEl.textContent = msg;
}

function itemKey(item) {
  return (item.producto + "|" + item.talla).toLowerCase();
}

function formatPrecio(val) {
  const n = parseFloat(val) || 0;
  return n.toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}

function esc(str) {
  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
</script>
</body>
</html>
